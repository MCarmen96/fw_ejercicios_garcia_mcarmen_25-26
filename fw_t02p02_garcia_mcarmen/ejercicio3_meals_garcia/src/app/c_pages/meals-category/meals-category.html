<h2>{{titleComp}}</h2>


<div class="container">
  <div class="row m-4">
    <select class="form-select" (change)="onCategoryChange($event)">
      <option value="0">Todas las categorias</option>
      @for(category of categorys; track category.idCategory){
      <option [value]="category.strCategory">{{category.strCategory}}</option>
      }

    </select>
    @if(isAuthenticated()){
    <button type="button" class="btn btn-outline-danger m-2" id="saveCategory" [disabled]="selectedCategory === '0'" (click)="saveCategory()" [ngClass]="{'active': botnClick}">
      Guardar categoria
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-heart"
        viewBox="0 0 16 16">
        <path
          d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01zM8 15C-7.333 4.868 3.279-3.04 7.824 1.143q.09.083.176.171a3 3 0 0 1 .176-.17C12.72-3.042 23.333 4.867 8 15">
        </path>
      </svg>
    </button>
    }
  </div>
</div>


@if (loading){

<div class="container">

  <div class="row g-4">


    @for(meal of meals; track meal.idMeal){
    <div class="col-12 col-md-6 col-lg-3 mb-4">
      <div class="card shadow h-100">
        <!-- <a [routerLink]="['/details', meal.idMeal]"> esta seria otra opcion,por is hay que añadir algo mas a la ruta mejor array -->
        <a routerLink="details/{{meal.idMeal}}"> <img [src]="meal.strMealThumb" class="card-img-top"
            [alt]="meal.strMeal"></a>


        <div class="card-body">
          <h5 class="card-title">{{meal.strMeal}}</h5>

          <p class="card-text">
            <strong>Categoría:</strong> {{meal.strCategory}}
          </p>

          <p class="card-text">
            <strong>Origen:</strong> {{meal.strArea}}
          </p>

          <h6>Ingredientes:</h6>

          <ul style="max-height: 100px; overflow-y: auto;">
            @for(ing of meal.ingredients; track $index){
            <li>
              {{ing.name}} -
              <small>{{ing.measure}}</small>
            </li>
            }
          </ul>


        </div>

      </div>

    </div>

    }

  </div>
</div>

}
