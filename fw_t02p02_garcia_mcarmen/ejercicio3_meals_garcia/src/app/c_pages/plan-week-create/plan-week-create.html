<div class="container mt-4">

  <!-- SECCIÓN 1: Identificador del plan -->
  <div class="row mb-4">
    <div class="col-12 col-md-5">
      <label class="form-label fw-semibold">Selecciona una fecha para el plan</label>
      <input type="date" class="form-control" (change)="onFechaChange($event)">

      @if (planId()) {
        <div class="mt-2 d-flex align-items-center gap-2">
          <span class="badge bg-dark fs-6">{{ planId() }}</span>
          @if (planIdError()) {
            <span class="text-danger small">{{ planIdError() }}</span>
          } @else {
            <span class="text-success small">✓ Semana disponible</span>
          }
        </div>
      }
    </div>
  </div>

  <!-- SECCIÓN 2: Añadir día al plan -->
@if (planId() && !planIdError()) {

  <div class="row g-3 align-items-end mb-4">

    <!-- Selector de día -->
    <div class="col-12 col-md-3">
      <label class="form-label fw-semibold">Día</label>
      <!-- $event.target es un HTMLSelectElement, lo ve como EventTarget genérico. Con $any() lo casteamos -->
      <select class="form-select"
        [disabled]="!planId() || !!planIdError()"
        (change)="diaSeleccionado.set($any($event.target).value); resultadosBusqueda.set([])">
        <option value="">Elige un día...</option>
        <option value="lunes">Lunes</option>
        <option value="martes">Martes</option>
        <option value="miércoles">Miércoles</option>
        <option value="jueves">Jueves</option>
        <option value="viernes">Viernes</option>
        <option value="sábado">Sábado</option>
        <option value="domingo">Domingo</option>
      </select>
    </div>

    <!-- Comida o Cena -->
    <div class="col-12 col-md-3">
      <label class="form-label fw-semibold">Tipo</label>
      <div class="d-flex gap-3 pt-1">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="tipo"
            id="tipoComida" value="lunch"
            [disabled]="!diaSeleccionado()"
            (change)="tipoSeleccionado.set('lunch'); resultadosBusqueda.set([])">
          <label class="form-check-label" for="tipoComida">Comida</label>
        </div>
        <div class="form-check">
          <!-- en el input al cambiar el tipo limpiamos el signal con-> resultadosBusqueda.set([])" -->
          <input class="form-check-input" type="radio" name="tipo"
            id="tipoCena" value="dinner"
            [disabled]="!diaSeleccionado()"
            (change)="tipoSeleccionado.set('dinner'); resultadosBusqueda.set([])">
          <label class="form-check-label" for="tipoCena">Cena</label>
        </div>
      </div>
    </div>

    <!-- Buscador -->
    <div class="col-12 col-md-6">
      <label class="form-label fw-semibold">Buscar receta por ingrediente</label>
      <div class="input-group">
        <input type="text" class="form-control"
          placeholder="Ej: chicken, pasta..."
          [disabled]="!diaSeleccionado() || !tipoSeleccionado()"
          #inputBusqueda>
        <button class="btn btn-dark"
          [disabled]="!diaSeleccionado() || !tipoSeleccionado()"
          (click)="buscarReceta(inputBusqueda.value)">
          Buscar
        </button>
      </div>
    </div>

  </div>

  <!-- Resultados del buscador -->
  @if (resultadosBusqueda().length > 0) {
    <div class="row g-3 mb-4">
      @for (meal of resultadosBusqueda(); track meal.idMeal) {
        <div class="col-6 col-md-3">
          <div class="card h-100 shadow-sm">
            <img [src]="meal.strMealThumb + '/preview'" class="card-img-top" [alt]="meal.strMeal">
            <div class="card-body p-2 d-flex flex-column justify-content-between">
              <p class="card-text small fw-semibold mb-2">{{ meal.strMeal }}</p>
              <button class="btn btn-sm btn-outline-dark w-100">
                + Añadir
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  }

}


</div>
