<!-- por qu es un signal meal()?  -->
@if (meal() !== null) {
<div class="container mt-4">
  <div class="card shadow-sm border-0 overflow-hidden">

    <div class="row g-0 align-items-center">

      <div class="col-12 col-md-5">
        <img [src]="meal()?.strMealThumb" [alt]="meal()?.strMeal" class="img-fluid w-100 h-100 object-fit-cover"
          style="min-height: 350px; max-height: 500px;" />
      </div>

      <div class="col-12 col-md-7">
        <div class="card-body p-4 p-lg-5">

          <span class="badge bg-primary-subtle text-primary mb-2 px-3 py-2 rounded-pill text-uppercase fw-bold">
            {{ meal()?.strCategory }}
          </span>

          <h1 class="card-title display-5 fw-bold text-dark mb-3">
            {{ meal()?.strMeal }}
          </h1>

          <hr class="text-muted my-4">

          <h4 class="text-secondary fw-semibold mb-3">
            <i class="bi bi-journal-text me-2"></i>Instrucciones de preparación:
          </h4>

          <h6>Ingredientes:</h6>

          <ul style="max-height: 100px; overflow-y: auto;">
            @for(ing of meal()?.ingredients; track $index){
            <li>
              {{ing.name}} -
              <small>{{ing.measure}}</small>
            </li>
            }
          </ul>

          <div class="d-grid d-md-flex justify-content-md-start mt-4">
            <button
              class="btn btn-success btn-lg px-4 py-2 shadow-sm d-flex align-items-center justify-content-center gap-2">
              <i class="bi bi-bookmark-heart-fill"></i>
              Guardar receta
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
